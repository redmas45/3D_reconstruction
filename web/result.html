<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>3D Reconstruction — Judge Result</title>
  <link rel="stylesheet" href="/assets/styles/result.css">
  <script src="/assets/scripts/result-view.js" type="module"></script>
</head>
<body>
  <main class="result-shell">
    <header>
      <div>
        <span class="eyebrow">AI-INFERRED EVIDENCE VISUALIZATION</span>
        <h1>Reconstruction result</h1>
      </div>
      <span class="result-status">Complete</span>
    </header>
    <section class="result-player">
      <div class="video-player">
        <video id="result-video" controls preload="metadata" src="/api/video"></video>
      </div>
      <div id="marker-root"></div>
      <p>Compressed judge preview. The full-quality video and reports are saved in Google Drive.</p>
    </section>
    <section id="presentation-root" aria-live="polite">
      <p class="loading">Loading the evidence story and gap review…</p>
    </section>
  </main>
</body>
</html>
